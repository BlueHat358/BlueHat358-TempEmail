name = "temp-mail"
main = "src/index.js"
compatibility_date = "2025-06-18"
compatibility_flags = ["nodejs_compat"]

# ─── KV Namespace ───────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "EMAILS"
id      = "GANTI_DENGAN_KV_NAMESPACE_ID"
# preview_id = "PREVIEW_KV_NAMESPACE_ID"   # uncomment setelah buat preview KV

# ─── R2 Bucket ──────────────────────────────────────────────────────────────
[[r2_buckets]]
binding     = "ATTACHMENTS"
bucket_name = "bluehat358-attachments"

# ─── Cron Trigger — cleanup R2 expired tiap jam ────────────────────────────
[triggers]
crons = ["0 * * * *"]

# ─── Domain Configuration ─────────────────────────────────────────────────
# Daftar domain yang didukung (dipisah spasi/koma).
# Bisa diatur via:
#   1) Environment variable DOMAIN_LIST di Cloudflare Dashboard
#   2) Atau tambahkan [vars] section di bawah ini (uncomment):
#
[vars]
DOMAIN_LIST = "bluehat358.eu.cc,bluehat358.ccwu.cc,bluehat358.pp.ua"
#
# Domain pertama akan menjadi default. User bisa memilih domain
# lain via dropdown select box di halaman utama.
# ───────────────────────────────────────────────────────────────────────────

# ─── Email Routing ────────────────────────────────────────────────────────
# Konfigurasi via Cloudflare Dashboard:
#   Email → Email Routing → Routes → Add route:
#   Pattern: *@bluehat358.eu.cc → Worker: bluehat358-tempmail
#   (Buat route terpisah untuk setiap domain tambahan)
