name = "bluehat358-tempmail"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# ─── KV Namespace ───────────────────────────────────────────────────────────
# ID diisi otomatis oleh GitHub Actions dari secret KV_NAMESPACE_ID
[[kv_namespaces]]
binding = "TEMP-EMAILS"
id      = "GANTI_DENGAN_KV_NAMESPACE_ID"

# ─── R2 Bucket ──────────────────────────────────────────────────────────────
[[r2_buckets]]
binding     = "TEMP-ATTACHMENTS"
bucket_name = "bluehat358-attachments"

# ─── Cron Trigger — cleanup R2 expired tiap jam ────────────────────────────
[triggers]
crons = ["0 * * * *"]

# ─── Durable Objects (Fase 3) ───────────────────────────────────────────────
[[durable_objects.bindings]]
name       = "INBOX_BROADCASTER"
class_name = "InboxBroadcaster"

[[migrations]]
tag         = "v1"
new_classes = ["InboxBroadcaster"]
