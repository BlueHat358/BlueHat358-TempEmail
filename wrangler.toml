name = "bluehat358-tempmail"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# ─── KV Namespace ───────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "EMAILS"
id      = "GANTI_DENGAN_KV_NAMESPACE_ID"
# preview_id = "PREVIEW_KV_NAMESPACE_ID"   # uncomment setelah buat preview KV

# ─── R2 Bucket ──────────────────────────────────────────────────────────────
[[r2_buckets]]
binding     = "ATTACHMENTS"
bucket_name = "bluehat358-attachments"

# ─── Cron Trigger — cleanup R2 expired tiap jam ────────────────────────────
[triggers]
crons = ["0 * * * *"]

# ─── Durable Objects (Fase 3) — SSE real-time broker ───────────────────────
[[durable_objects.bindings]]
name       = "INBOX_BROADCASTER"
class_name = "InboxBroadcaster"

[[migrations]]
tag         = "v2"
new_sqlite_classes = ["InboxBroadcaster"]

# ─── Email Routing ────────────────────────────────────────────────────────
# Konfigurasi via Cloudflare Dashboard:
#   Email → Email Routing → Routes → Add route:
#   Pattern: *@bluehat358.biz.id → Worker: bluehat358-tempmail
